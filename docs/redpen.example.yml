# Example .redpen.yml -- copy to your project root as `.redpen.yml`.
#
# Each rule maps a claim_pattern (regex, matched against a claim RedPen
# extracted) to a command whose exit code and/or output decides the verdict:
#   - exit/output match expectations      -> OK
#   - command ran but expectations missed -> FAIL
#   - couldn't run / timed out / ambiguous-> UNVERIFIABLE  (never a guessed FAIL)
#
# Execution is gated. A rule runs on the normal `redpen check` only if it sets
# `safe: true` (use only for fast, read-only checks). Rules without it run only
# under `redpen check --run`. Claims hit the FIRST matching rule.

rules:
  # "the migration ran" -> confirm the DB is at head (read-only, so safe).
  - name: migration-applied
    claim_pattern: "(ran|applied).*migration"
    command: "alembic current"
    expect_output: "(head)"
    safe: true
    timeout: 10

  # "deployed to staging" -> hit the health endpoint. Side-effecting-ish, so
  # this one runs only under --run.
  - name: staging-healthy
    claim_pattern: "deployed to staging"
    command: "curl -fsS https://staging.example.com/healthz"
    expect_exit: 0

  # "regenerated the API client" -> the generated file should mention the symbol.
  - name: codegen-fresh
    claim_pattern: "(re)?generated.*(client|types|schema)"
    command: "grep -q 'generated by openapi' src/api/client.ts"
    expect_exit: 0
    safe: true
